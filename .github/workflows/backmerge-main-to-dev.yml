name: Manual Backmerge Main To Dev

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: backmerge-main-to-dev
  cancel-in-progress: false

jobs:
  backmerge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Backmerge main into dev
        run: bash scripts/cicd/backmerge_main_to_dev.sh
