repos:
  - repo: local
    hooks:
      - id: format
        name: poe fmt
        entry: uv run poe fmt
        language: system
        pass_filenames: false
        types: [python]
      - id: lint
        name: poe lint
        entry: uv run poe lint
        language: system
        pass_filenames: false
        types: [python]
