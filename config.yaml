# Non-sensitive configuration defaults.
# Secrets go in .env (never committed to git).

server:
  host: "0.0.0.0"
  port: 8665
  reload: true

cors:
  allow_origins:
    - "http://localhost:5173"
    - "http://localhost:8006"

frontend:
  base_url: "http://localhost:8006"

logging:
  level: "INFO"                # DEBUG / INFO / WARNING / ERROR
  log_dir: "logs"
  retention_days: 30           # app.log retention
  error_retention_days: 90     # error.log retention
  rotation: "00:00"            # daily at midnight
  compression: "gz"
